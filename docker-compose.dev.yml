services:
  postgres:
    image: postgres:15-alpine
    container_name: inkhoard-postgres-dev
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: getInked
      POSTGRES_DB: inkhoard_dev
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d inkhoard_dev"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
